from_latest_tag = false
ignore_merge_commits = true
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
branch_whitelist = ["main"]
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = ["./scripts/bump_version.py --version {{version}}"]
post_bump_hooks = [
  # Re-tag release commit to ensure an annotated tag
  "git tag {{version_tag}} {{version_tag}}^{} --force --annotate --message='Release {{version_tag}}'",
]
pre_package_bump_hooks = []
post_package_bump_hooks = []
tag_prefix = "v"

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e
cog verify --file $1
"""

[commit_types]
revert = { bump_minor = true }

[changelog]
path = "CHANGELOG.md"
authors = []

[bump_profiles]
